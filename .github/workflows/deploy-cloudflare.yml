name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-cloudflare.yml"
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
      WEB_API_URL: ${{ secrets.WEB_API_URL }}
      WEB_AUTH_URL: ${{ secrets.WEB_AUTH_URL }}
      WEB_MAPBOX_API_KEY: ${{ secrets.WEB_MAPBOX_API_KEY }}
      API_ALLOWED_ORIGINS: ${{ secrets.API_ALLOWED_ORIGINS }}
      API_DATABASE_URL: ${{ secrets.API_DATABASE_URL }}
      API_CONTROL_PLANE_DATABASE_URL: ${{ secrets.API_CONTROL_PLANE_DATABASE_URL }}
      API_GOOGLE_MAPS_API_KEY: ${{ secrets.API_GOOGLE_MAPS_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deploy configuration
        run: |
          set -euo pipefail

          required_vars=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            WEB_BASE_URL
            WEB_API_URL
            WEB_MAPBOX_API_KEY
            API_ALLOWED_ORIGINS
            API_DATABASE_URL
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error::Missing required GitHub secret ${var_name}"
              exit 1
            fi
          done

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Build TanStack Start web app for Cloudflare
        working-directory: apps/web
        env:
          VITE_BASE_URL: ${{ env.WEB_BASE_URL }}
          VITE_API_URL: ${{ env.WEB_API_URL }}
          VITE_MAP_BOX_API_KEY: ${{ env.WEB_MAPBOX_API_KEY }}
        run: |
          export VITE_AUTH_URL="${WEB_AUTH_URL:-${WEB_API_URL}}"
          npm run build:cloudflare

      - name: Sync API secrets
        working-directory: apps/api
        run: |
          set -euo pipefail

          printf '%s' "${API_DATABASE_URL}" | npx wrangler secret put DATABASE_URL --config wrangler.jsonc

          if [ -n "${API_CONTROL_PLANE_DATABASE_URL:-}" ]; then
            printf '%s' "${API_CONTROL_PLANE_DATABASE_URL}" | npx wrangler secret put CONTROL_PLANE_DATABASE_URL --config wrangler.jsonc
          fi

          if [ -n "${API_GOOGLE_MAPS_API_KEY:-}" ]; then
            printf '%s' "${API_GOOGLE_MAPS_API_KEY}" | npx wrangler secret put GOOGLE_MAPS_API_KEY --config wrangler.jsonc
          fi

      - name: Deploy API worker
        working-directory: apps/api
        run: |
          set -euo pipefail

          npx wrangler deploy \
            --config wrangler.jsonc \
            --var "CORS_ALLOWED_ORIGINS:${API_ALLOWED_ORIGINS}" \
            --keep-vars

      - name: Deploy web worker
        working-directory: apps/web
        run: npx wrangler deploy --config ./.output/server/wrangler.json
